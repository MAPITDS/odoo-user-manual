site_name: MAP Odoo User Manual
site_url: https://mapitds.github.io/odoo-user-manual/

theme:
  name: material
  custom_dir: override
  palette:
    # Konfigurasi warna (kita pakai Indigo khas Odoo Enterprise)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Mode Gelap
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Mode Terang
  features:
    # - navigation.tabs        # Menu utama di bagian atas
    - navigation.sections      # Sub-menu rapi di samping
    - navigation               # Sub-menu bisa diperluas
    - navigation.indexes
    - search.suggest           # Rekomendasi pencarian otomatis
    - search.highlight         # Efek stabilo pada teks yang dicari

# Mengaktifkan fitur kotak informasi berwarna (Admonitions)
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      # emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_index: !!python/name:pymdownx.emoji.gemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - glightbox
  - git-revision-date-localized:
      type: datetime
      locale: id
      timezone: Asia/Jakarta
      fallback_to_build_date: true

extra:
  assets:
    - icon_modul

# Struktur Navigasi Menu Web Anda
nav:
  - Home : index.md

  - Sales Department : 
    - "🛃 Modules":
      - Negotiation Sheet : negotiation_sheet/negotiation_sheet.md
      - Sales : sales/sales_quotation.md
      - Sales Target : target/sales_target.md
  
  - Purchase Department :
    - "🛃 Modules":
      - Purchase Request : purchase/purchase_request.md
      - Purchase Order : purchase/purchase_order.md

  - Warehouse Department :
    - "🛃 Modules":
      - Inventory : inventory/inventory.md
      - Receipts Order : inventory/inventory_ri.md
      - Delivery Order : inventory/inventory_do.md
      - Internal Transfer : inventory/internal_transfer.md
  
  - Additional Modules :
    - "🛃 Productivity":
      - Timesheet : additional_modules/timesheet.md
      - Project : additional_modules/project.md
      - Helpdesk : additional_modules/helpdesk.md
      - Knowledge : additional_modules/knowledge.md
      - Calendar : additional_modules/calendar.md
      - Notes : additional_modules/notes.md
      - Discuss : additional_modules/discuss.md
      - Survey : additional_modules/survey.md
      - Events : additional_modules/events.md
  - Reporting : 
    - Accounting : additional_modules/accounting.md
    - Inventory : inventory/inventory.md